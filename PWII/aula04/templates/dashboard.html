{% extends "layout.html" %}
{% block content %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos com Chart.js</title>
   
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .chart-card:hover {
            transform: translateY(-5px);
        }
        
        .chart-title {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .update-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: transform 0.3s ease;
            border: none;
            outline: none;
        }
        
        .update-btn:hover {
            transform: scale(1.05);
        }
        
        .update-btn:active {
            transform: scale(0.95);
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>


    <div class="container">
        <h1>📊 Dashboard com Chart.js</h1>
        
        <!-- Grid de gráficos -->
        <div class="charts-grid">
            <!-- Gráfico 1: Barras - Vendas Mensais -->
            <div class="chart-card">
                <div class="chart-title">📈 Vendas Mensais</div>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <!-- Gráfico 2: Linha - Crescimento Anual -->
            <div class="chart-card">
                <div class="chart-title">📉 Crescimento Anual</div>
                <div class="chart-container">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
            
            <!-- Gráfico 3: Pizza - Distribuição de Produtos -->
            <div class="chart-card">
                <div class="chart-title">🥧 Distribuição de Produtos</div>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Botão para atualizar dados -->
        <button class="update-btn" onclick="updateCharts()">
            🔄 Atualizar Dados
        </button>
        
        <!-- Cards de estatísticas -->
        <div class="stats-container">
            <div class="stat-box">
                <div>💰 Total Vendas</div>
                <div class="stat-value" id="totalVendas">R$ 0</div>
                <div class="stat-label">Últimos 30 dias</div>
            </div>
            
            <div class="stat-box">
                <div>📦 Média Mensal</div>
                <div class="stat-value" id="mediaMensal">0</div>
                <div class="stat-label">Unidades/mês</div>
            </div>
            
            <div class="stat-box">
                <div>⭐ Produto Top</div>
                <div class="stat-value" id="produtoTop">-</div>
                <div class="stat-label">Mais vendido</div>
            </div>
        </div>
    </div>

    <script>
        // Dados iniciais
        const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        
        // Função para gerar números aleatórios
        function gerarDadosAleatorios(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Dados para gráfico de barras
        const dadosVendas = [65, 59, 80, 81, 56, 55, 72, 85, 90, 78, 82, 88];
        
        // Dados para gráfico de linha
        const dadosCrescimento = [28, 35, 42, 48, 55, 62, 70, 78, 85, 92, 98, 105];
        
        // Dados para gráfico de pizza
        const dadosProdutos = {
            labels: ['Eletrônicos', 'Roupas', 'Alimentos', 'Livros', 'Outros'],
            valores: [35, 25, 20, 15, 5]
        };

        // Criar gráficos
        let barChart, lineChart, pieChart;

        function criarGraficos() {
            // Gráfico de Barras
            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [{
                        label: 'Vendas (milhares)',
                        data: dadosVendas,
                        backgroundColor: 'rgba(102, 126, 234, 0.7)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 5,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `R$ ${context.raw} mil`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return 'R$ ' + value + 'k';
                                }
                            }
                        }
                    }
                }
            });

            // Gráfico de Linha
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            lineChart = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: meses,
                    datasets: [{
                        label: 'Crescimento %',
                        data: dadosCrescimento,
                        borderColor: 'rgb(255, 99, 132)',
                        backgroundColor: 'rgba(255, 99, 132, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: 'rgb(255, 99, 132)',
                        pointBorderColor: 'white',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.raw}% de crescimento`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });

            // Gráfico de Pizza
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: dadosProdutos.labels,
                    datasets: [{
                        data: dadosProdutos.valores,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(153, 102, 255, 0.8)'
                        ],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                padding: 15
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    let value = context.raw || 0;
                                    let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    let percentage = Math.round((value / total) * 100);
                                    return `${label}: ${value}% (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });

            atualizarEstatisticas();
        }

        // Função para atualizar estatísticas
        function atualizarEstatisticas() {
            // Total de vendas
            const total = dadosVendas.reduce((a, b) => a + b, 0);
            document.getElementById('totalVendas').textContent = `R$ ${total}k`;
            
            // Média mensal
            const media = Math.round(total / dadosVendas.length);
            document.getElementById('mediaMensal').textContent = media;
            
            // Produto mais vendido
            const maxIndex = dadosProdutos.valores.indexOf(Math.max(...dadosProdutos.valores));
            document.getElementById('produtoTop').textContent = dadosProdutos.labels[maxIndex];
        }

        // Função para atualizar todos os gráficos com novos dados
        function updateCharts() {
            // Gerar novos dados para vendas
            const novosDadosVendas = dadosVendas.map(() => gerarDadosAleatorios(40, 120));
            barChart.data.datasets[0].data = novosDadosVendas;
            
            // Gerar novos dados para crescimento
            const novosDadosCrescimento = dadosCrescimento.map(() => gerarDadosAleatorios(20, 150));
            lineChart.data.datasets[0].data = novosDadosCrescimento;
            
            // Gerar novos dados para produtos
            const novosDadosProdutos = dadosProdutos.valores.map(() => gerarDadosAleatorios(5, 50));
            pieChart.data.datasets[0].data = novosDadosProdutos;
            
            // Atualizar todos os gráficos
            barChart.update();
            lineChart.update();
            pieChart.update();
            
            // Atualizar arrays originais
            dadosVendas.length = 0;
            dadosVendas.push(...novosDadosVendas);
            
            dadosCrescimento.length = 0;
            dadosCrescimento.push(...novosDadosCrescimento);
            
            dadosProdutos.valores.length = 0;
            dadosProdutos.valores.push(...novosDadosProdutos);
            
            // Atualizar estatísticas
            atualizarEstatisticas();
            
            // Adicionar animação no botão
            const btn = document.querySelector('.update-btn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
        }

        // Inicializar gráficos quando a página carregar
        document.addEventListener('DOMContentLoaded', criarGraficos);
    </script>
{% endblock %}
