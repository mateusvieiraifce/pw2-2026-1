{% extends "laysemmenu.html" %}

{% block content %}
    <form action="{{ url_for('login') }}" method="post"> 
        <div class="content_login">
        <div class="content_login_interno">
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" class="content_input">
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" class="content_input">
           <input type="submit" value="Login" class="button"> 
        </div>
        </div>
   
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    </form>
{% endblock %}
