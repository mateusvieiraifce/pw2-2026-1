{% extends "layout.html" %}

{% block content %}
    <form action="{{ url_for('update_user_do') }}" method="post"> 
        <div class="content_login">
        <div class="content_login_interno">
             <input type="text" id="login" name="id"  class="content_input" value="{{user.id}}">
            <input type="text" id="login" name="login" placeholder="Digite seu login" class="content_input" value="{{user.login}}">
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" class="content_input" value="{{user.nome}}">
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" class="content_input" value="{{user.senha}}">
            <input type="password" id="senha" name="csenha" placeholder="Confirme sua senha" class="content_input" value="{{user.senha}}">
           <input type="submit" value="Salvar" class="button"> 
        </div>
        </div>
   
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    </form>
{% endblock %}
